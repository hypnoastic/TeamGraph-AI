version: '3.8'

services:
  neo4j:
    image: neo4j:5.26.0
    container_name: teamgraph-neo4j
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/teamgraph_demo_pass
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
