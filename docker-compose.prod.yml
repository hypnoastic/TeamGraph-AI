services:
  api:
    image: ghcr.io/hypnoastic/teamgraph-api:latest
    environment:
      API_PORT: 8000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY}
      DEMO_MODE: ${DEMO_MODE:-false}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      GRAPHITI_LLM_PROVIDER: ${GRAPHITI_LLM_PROVIDER}
      TEAMGRAPH_API_KEY: ${TEAMGRAPH_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY}
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-credentials.json
    volumes:
      - ./google-credentials.json:/app/google-credentials.json:ro
    restart: unless-stopped

  web:
    image: ghcr.io/hypnoastic/teamgraph-web:latest
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_BASE_URL}
      API_TARGET: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - web
      - api
    restart: unless-stopped
